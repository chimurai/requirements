name: CI

on: ["push","pull_request"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v6
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x

    - uses: actions/cache@v5
      id: npm-cache # use this to check for `cache-hit` (`steps.npm-cache.outputs.cache-hit != 'true'`)
      with:
        path: '**/node_modules'
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: npm ci
      if: steps.npm-cache.outputs.cache-hit != 'true' # Over here!
      run: npm ci --ignore-scripts

    - name: npm lint
      run: npm run lint

      env:
        CI: true

  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x, 26.x]

    steps:

    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}

    - uses: actions/cache@v5
      id: npm-cache # use this to check for `cache-hit` (`steps.npm-cache.outputs.cache-hit != 'true'`)
      with:
        path: '**/node_modules'
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: npm ci
      if: steps.npm-cache.outputs.cache-hit != 'true' # Over here!
      run: npm ci --ignore-scripts

    - name: npm build
      run: npm run build

    - name: npm test
      run: npm test -- --reporter="default" --reporter="github-actions"

      env:
        CI: true

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v6
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x

    - uses: actions/cache@v5
      id: npm-cache # use this to check for `cache-hit` (`steps.npm-cache.outputs.cache-hit != 'true'`)
      with:
        path: '**/node_modules'
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: npm ci
      if: steps.npm-cache.outputs.cache-hit != 'true' # Over here!
      run: npm ci --ignore-scripts

    - name: npm build
      run: npm run build

    - name: npm coverage
      run: npm run coverage

    - name: Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.github_token }}
        format: clover
